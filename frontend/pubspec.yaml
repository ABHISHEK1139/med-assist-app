name: med_assist_app
description: "Med Assist App - Local Medical AI Assistant"
publish_to: 'none'
version: 0.2.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # HTTP & Networking
  dio: ^5.4.0
  http: ^1.2.0  # For Google Drive download
  
  # Local Storage
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  sqflite: ^2.3.0  # For structured health timeline
  permission_handler: ^11.3.1  # For persistent storage access
  shared_preferences: ^2.2.2  # For saving PC connection settings
  
  # On-Device AI - MediaPipe LLM
  # Note: Model file goes in assets/models/
  
  # UI Components
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  
  # File Handling
  file_picker: ^6.1.1
  mime: ^1.0.4
  image_picker: ^1.0.7  # For camera capture
  
  # Development Tools
  device_preview: ^1.1.0
  speech_to_text: ^7.4.0
  health: ^13.1.3
  google_mlkit_text_recognition: ^0.12.0
  pdf: ^3.10.8
  printing: ^5.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  bloc_test: ^9.1.5
  mocktail: ^1.0.2

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
